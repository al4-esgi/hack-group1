services:
  db:
    build: ./db
    restart: always
    shm_size: 128mb
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 134217728
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-extensions.sql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  app:
    build:
      context: .
      target: runner
    restart: always
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      - db

  watch:
    build:
      context: .
      target: builder
    restart: always
    env_file:
      - .env
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /app/node_modules
    depends_on:
      - app
    # On écrase l'ENTRYPOINT pour lancer le script
    entrypoint: ["sh", "watch-and-deploy.sh"]
